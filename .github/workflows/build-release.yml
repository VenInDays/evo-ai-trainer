name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias evoai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=EvoAI, OU=Dev, O=EvoAI Trainer, L=SG, ST=SG, C=SG"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=release.keystore \
            -PKEYSTORE_PASSWORD=android \
            -PKEY_ALIAS=evoai \
            -PKEY_PASSWORD=android

      - name: Verify APK signing (V2 + V3)
        run: |
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner verify -v \
            app/build/outputs/apk/release/app-release.apk || true
          echo "--- Signing verification complete ---"

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName.*=.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
            EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: EvoAI Trainer v${{ steps.version.outputs.version }}
          body: |
            ## EvoAI Trainer v${{ steps.version.outputs.version }}

            ### What's New in V4.0.0 — Commercial Grade & Stability

            **Structural AI Brain Upgrade:**
            - **MLP with ReLU**: Upgraded to Multi-Layer Perceptron with Leaky ReLU hidden layers + Sigmoid output
            - **He Initialization**: Proper weight initialization for faster convergence
            - **Feature Normalization**: Pixels 0-255 → 0.0-1.0 for stable sigmoid inputs
            - **Cross-Validation**: 80% Training / 20% Validation split — fitness scored on validation set to prevent overfitting

            **Advanced Training & Mutation:**
            - **Decaying Mutation Rate**: Auto-decreases as accuracy >90% for fine-tuning
            - **Anti-Stagnation (Jittering)**: 20 stagnant gens → Neural Jitter (tiny noise to ALL weights)
            - **Hyper-Mutation**: 15 stagnant gens → 2x mutation rate for 1 round
            - **Lower-Loss Tiebreaker**: Same accuracy → model with lower BCE loss wins

            **Commercial Model Storage:**
            - **Internal Storage**: Models saved to `context.filesDir` instead of SharedPreferences
            - **Auto-Recovery**: Loads `latest_checkpoint.ckpt` on startup
            - **Export Champion .model**: JSON format compatible with Web/other apps

            **UI/UX Commercial Lab:**
            - **Confidence Meter**: Progress bar showing "Like - 98.2% Sure" or "UNCERTAIN" if <50%
            - **Confusion Matrix**: TP/FP/FN/TN table with Precision/Recall/F1
            - **Manual Override**: "Correct the AI" button adds hard examples for next training
            - **Decay Rate Dashboard**: Shows current decaying mutation rate

            **Technical:**
            - **Memory Management**: Explicit nulling of discarded models + System.gc()
            - **Thread Safety**: synchronized blocks for model replication
            - **BCE Loss**: Binary Cross-Entropy loss tracking per model

            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" on your Android device
            3. Install the APK

            **Requires**: Android 7.0+ (API 24)
          files: |
            EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Release
        run: |
          echo "Release v${{ steps.version.outputs.version }} created successfully!"
          echo "APK: EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk"
          ls -la EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk
