name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias evoai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=EvoAI, OU=Dev, O=EvoAI Trainer, L=SG, ST=SG, C=SG"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=release.keystore \
            -PKEYSTORE_PASSWORD=android \
            -PKEY_ALIAS=evoai \
            -PKEY_PASSWORD=android

      - name: Verify APK signing (V2 + V3)
        run: |
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner verify -v \
            app/build/outputs/apk/release/app-release.apk || true
          echo "--- Signing verification complete ---"

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName.*=.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
            EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: EvoAI Trainer v${{ steps.version.outputs.version }}
          body: |
            ## EvoAI Trainer v${{ steps.version.outputs.version }}

            ### What's New in V3.0.0
            - **Hard-Core Evolution Loop**: Top 2 survive, 8 are purged, 8 clones repopulate
            - **Dynamic Lineage**: Children can outperform parents — no model is safe
            - **Model Identity Naming**: "Model [ID] Gen [Generation]" family tracking
            - **LEGACY/CLONE Badges**: Gold LEGACY for survivors, GEN[X] CLONE for offspring
            - **Sparkline Charts**: Tiny fitness trend graphs on each model card
            - **Gaussian Mutation**: Natural distribution weight perturbation (0.01-0.50 range)
            - **Hyper-Mutation**: Auto-doubles mutation rate after 15 stagnant generations
            - **Global Best Dashboard**: All-time highest accuracy ever recorded
            - **Active Mutation Rate**: Shows current rate including auto-boosts
            - **Top-2 Persistence**: Best 2 models saved every generation (crash-proof)
            - **Test Lab**: Gallery photo prediction with confidence display
            - **Export Champion .model / Export State .ckpt**: Full file export

            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" on your Android device
            3. Install the APK

            **Requires**: Android 7.0+ (API 24)
          files: |
            EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Release
        run: |
          echo "✅ Release v${{ steps.version.outputs.version }} created successfully!"
          echo "APK: EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk"
          ls -la EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk
