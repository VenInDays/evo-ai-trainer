name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias evoai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=EvoAI, OU=Dev, O=EvoAI Trainer, L=SG, ST=SG, C=SG"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=release.keystore \
            -PKEYSTORE_PASSWORD=android \
            -PKEY_ALIAS=evoai \
            -PKEY_PASSWORD=android

      - name: Verify APK signing (V2 + V3)
        run: |
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner verify -v \
            app/build/outputs/apk/release/app-release.apk || true
          echo "--- Signing verification complete ---"

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName.*=.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
            EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: EvoAI Trainer v${{ steps.version.outputs.version }}
          body: |
            ## EvoAI Trainer v${{ steps.version.outputs.version }}

            ### What's New
            - **Top-2 Elite Retention**: Best 2 models survive each generation
            - **8 Mutated Clones**: 4 clones from each Elite with mutation variance tracking
            - **Model Pedigree Badges**: 👑 Elite, 🧬 Clone, ⚠️ Reset indicators
            - **Stagnation Tracking**: Counter for generations without improvement
            - **Live History Log**: Scrollable console showing last 10 generations
            - **Target Accuracy Slider**: Configurable 10-100% stop condition
            - **Model Export/Import**: .model (inference) and .ckpt (full state) files
            - **Live Testing Module**: Gallery image → prediction with confidence
            - **Auto-Save**: Best model checkpoint every 5 generations
            - **Parallel Training**: Kotlin Coroutines Dispatchers.Default

            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" on your Android device
            3. Install the APK

            **Requires**: Android 7.0+ (API 24)
          files: |
            EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Release
        run: |
          echo "✅ Release v${{ steps.version.outputs.version }} created successfully!"
          echo "APK: EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk"
          ls -la EvoAI-Trainer-v${{ steps.version.outputs.version }}.apk
